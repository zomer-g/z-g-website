services:
  - type: web
    name: z-g-website
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    # Persistent disk for runtime user uploads (post PDFs, media images).
    # Without this, files written to public/uploads live on the ephemeral
    # container filesystem and are wiped on every deploy/restart. The disk is
    # mounted over public/uploads; scripts/restore-seed-uploads.mjs repopulates
    # the git-committed seed thumbnails onto a fresh disk at startup.
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: z-g-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        value: https://z-g-website.onrender.com
      - key: SITE_URL
        value: https://z-g-website.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: z-g-db
    plan: basic-256mb
    region: frankfurt
    databaseName: zg_website
