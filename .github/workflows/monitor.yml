name: data-source monitor

# Early-warning smoke tests for every TAG-IT / CKAN / DB-backed page.
# Runs on a schedule and hits the LIVE production API (no secrets needed).
# When it fails, GitHub emails the repo owner — that's the early warning.

on:
  schedule:
    # Every 3 hours, on the hour (UTC). Adjust cron to taste.
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Don't pile up overlapping scheduled runs.
concurrency:
  group: data-source-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Monitor only needs tsx + node; a full install is simplest and cached.
      - name: Install dependencies
        run: npm ci
        env:
          # Skip the prisma generate postinstall — the monitor never touches the
          # DB client, and it would need the schema/engines for nothing.
          PRISMA_SKIP_POSTINSTALL_GENERATE: "true"

      - name: Run monitor
        run: npm run test:monitor
        env:
          MONITOR_BASE_URL: https://www.z-g.co.il
          # Direct TAG-IT probe runs too when this secret is set in the repo.
          RULINGS_API_KEY: ${{ secrets.RULINGS_API_KEY }}
